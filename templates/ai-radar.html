<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="AI Radar by Alvaro Molina: a focused stream of AI, agents, and developer-tooling updates."
  >
  <title>AI Radar | Alvaro Molina</title>
  <link rel="shortcut icon" href="./images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  >
  <link href="script.css" rel="stylesheet">
  <style>
    .ai-radar-page .portfolio-shell {
      min-height: 100vh;
    }

    .ai-radar-page .sidebar {
      align-self: start;
    }

    .ai-radar-page .sidebar-panel {
      display: grid;
    }

    .ai-radar-page .section-nav a {
      text-decoration: none;
    }

    .ai-radar-page .content-stack {
      display: block;
    }
  </style>
</head>

<body class="ai-radar-page" data-theme="green" data-language="en">
  <div class="page-glow glow-one" aria-hidden="true"></div>
  <div class="page-glow glow-two" aria-hidden="true"></div>

  <main class="portfolio-shell">
    <aside class="sidebar card">
      <div class="profile-block">
        <div class="avatar-wrap">
          <img src="./images/author.png" alt="Portrait of Alvaro Molina" class="avatar">
        </div>

        <div class="profile-copy">
          <p class="eyebrow">Standalone tool</p>
          <h1 class="name">AI Radar</h1>
          <p class="role">A separated research surface so the portfolio stays fast.</p>
        </div>
      </div>

      <div class="sidebar-panel">
        <div class="sidebar-note">
          <p>Market signals, agent tooling, and developer-platform updates in one focused view.</p>
        </div>

        <div class="sidebar-actions">
          <a class="btn btn-primary has-icon" href="./index.html">
            <ion-icon name="arrow-back-outline" aria-hidden="true"></ion-icon>
            <span>Back to portfolio</span>
          </a>
          <a class="btn btn-secondary has-icon" href="./planning.html">
            <ion-icon name="calendar-outline" aria-hidden="true"></ion-icon>
            <span>Planning OS</span>
          </a>
        </div>
      </div>
    </aside>

    <section class="main-stage">
      <header class="topbar card">
        <a href="./index.html" class="brand">
          <span class="brand-mark">am</span>
          <span class="brand-copy">
            <strong>alvrich</strong>
            <small>ai radar</small>
          </span>
        </a>

        <nav class="section-nav" aria-label="Secondary navigation">
          <a class="nav-tab is-active" href="./ai-radar.html">AI Radar</a>
          <a class="nav-tab" href="./index.html#work">Portfolio</a>
          <a class="nav-tab" href="./index.html#contact">Contact</a>
        </nav>
      </header>

      <section class="content-stack" data-ai-radar-mount></section>
    </section>
  </main>

  <script src="aiRadar.js" defer></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>

</html>
