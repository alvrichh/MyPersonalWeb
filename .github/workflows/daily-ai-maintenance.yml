name: Daily AI maintenance

on:
  schedule:
    # 08:00 UTC = daily AI radar maintenance.
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-ai-maintenance
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ai-maintenance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify production build before maintenance
        run: npm run build

      - name: Generate AI maintenance report and radar data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-20250514' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
        run: npm run ai:radar

      - name: Verify production build after maintenance
        run: npm run build

      - name: Write safe daily streak heartbeat
        run: |
          mkdir -p docs/ai-watch
          {
            echo "# Daily maintenance heartbeat"
            echo
            echo "Last successful maintenance build: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo
            echo "This file is intentionally updated by the safe daily AI maintenance workflow after both production builds pass."
          } > docs/ai-watch/streak.md

      - name: Check safe generated changes
        id: changes
        run: |
          git add docs/ai-watch assets/data/ai-radar.json
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Report ignored unsafe working tree changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          UNSAFE_CHANGES=$(git status --porcelain | grep -v ' docs/ai-watch/' | grep -v ' assets/data/ai-radar.json$' || true)
          if [ -n "$UNSAFE_CHANGES" ]; then
            echo "Ignoring non-safe generated changes. They will not be committed:"
            echo "$UNSAFE_CHANGES"
          else
            echo "Only safe AI radar files changed."
          fi

      - name: Commit and push safe AI maintenance data
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "Alvaro Rodriguez Molina"
          git config user.email "81918923+alvrichh@users.noreply.github.com"
          git commit -m "AI Radar update - $(date +'%Y-%m-%d')"
          git push

      - name: No changes summary
        if: steps.changes.outputs.has_changes != 'true'
        run: echo "No AI maintenance changes detected today."
