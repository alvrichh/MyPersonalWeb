name: Daily AI maintenance

on:
  schedule:
    # 07:30 UTC = 08:30/09:30 in Spain depending on daylight saving time.
    - cron: "30 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-ai-maintenance
  cancel-in-progress: false

jobs:
  ai-maintenance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify production build before maintenance
        run: npm run build

      - name: Generate AI maintenance report and radar data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
        run: npm run ai:maintenance

      - name: Verify production build after maintenance
        run: npm run build

      - name: Check safe generated changes
        id: changes
        run: |
          if git diff --quiet -- docs/ai-watch assets/data/ai-radar.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Guard against unsafe file changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          UNSAFE_CHANGES=$(git diff --name-only | grep -v '^docs/ai-watch/' | grep -v '^assets/data/ai-radar.json$' || true)
          if [ -n "$UNSAFE_CHANGES" ]; then
            echo "Unsafe changes detected:"
            echo "$UNSAFE_CHANGES"
            exit 1
          fi

      - name: Commit and push safe AI maintenance data
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "alvrich-ai-maintenance-bot"
          git config user.email "actions@github.com"
          git add docs/ai-watch assets/data/ai-radar.json
          git commit -m "Daily AI radar maintenance"
          git push

      - name: No changes summary
        if: steps.changes.outputs.has_changes != 'true'
        run: echo "No AI maintenance changes detected today."
