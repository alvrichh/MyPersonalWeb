name: OpenAI Code Review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Optional commit SHA to review manually"
        required: false
        type: string

jobs:
  openai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 3

      - name: Prepare review context
        id: context
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=3
            FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -E '\.(html|css|js|mjs|json|yml|yaml|md)$' | head -25 || true)
            git diff --unified=40 "origin/${{ github.base_ref }}...HEAD" -- $FILES > /tmp/review_diff.txt || true
            TARGET_LABEL="PR #${{ github.event.pull_request.number }}"
          elif [ -n "${{ inputs.commit_sha }}" ]; then
            TARGET="${{ inputs.commit_sha }}"
            FILES=$(git diff-tree --no-commit-id --name-only -r "$TARGET" | grep -E '\.(html|css|js|mjs|json|yml|yaml|md)$' | head -25 || true)
            git show --unified=40 --format=short "$TARGET" -- $FILES > /tmp/review_diff.txt || true
            TARGET_LABEL="commit $TARGET"
          else
            FILES=$(git diff --name-only HEAD~1 HEAD | grep -E '\.(html|css|js|mjs|json|yml|yaml|md)$' | head -25 || true)
            git diff --unified=40 HEAD~1 HEAD -- $FILES > /tmp/review_diff.txt || true
            TARGET_LABEL="manual workflow run"
          fi

          if [ -z "$FILES" ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No relevant files changed." > /tmp/review_diff.txt
          else
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi

          echo "target_label=$TARGET_LABEL" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$FILES" > /tmp/changed_files.txt

      - name: Build prompt
        run: |
          set -euo pipefail
          REVIEW_GUIDE=""
          if [ -f .github/ai-review/SKILL.md ]; then
            REVIEW_GUIDE=$(cat .github/ai-review/SKILL.md)
          fi

          DIFF=$(head -c 50000 /tmp/review_diff.txt)
          FILES=$(cat /tmp/changed_files.txt)

          cat > /tmp/review_prompt.txt <<EOF
          Eres un code reviewer senior para el portfolio personal MyPersonalWeb.

          Usa esta memoria del proyecto como guía:

          $REVIEW_GUIDE

          Archivos cambiados:
          $FILES

          Diff/contexto a revisar:
          $DIFF

          Devuelve SOLO una review en español, máximo 5 bullets. Sé crítico y constructivo. No repitas consejos genéricos. Si no hay problemas reales, dilo y explica qué comprobaste.
          EOF

      - name: Ask OpenAI to review
        id: openai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_REVIEW_MODEL || 'gpt-4o-mini' }}
        run: |
          set -euo pipefail

          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OpenAI API key is missing. Skipping review without creating noise."
            echo "has_review=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PROMPT=$(cat /tmp/review_prompt.txt)
          PAYLOAD=$(jq -n \
            --arg model "$OPENAI_MODEL" \
            --arg prompt "$PROMPT" \
            '{
              model: $model,
              input: [
                {role: "system", content: "You are a senior code reviewer. Follow the project memory exactly. Return concise Spanish feedback only."},
                {role: "user", content: $prompt}
              ]
            }')

          HTTP_CODE=$(curl -sS -w "%{http_code}" -o /tmp/openai_response.json https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -d "$PAYLOAD")

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "OpenAI API returned HTTP $HTTP_CODE. Skipping review comment."
            cat /tmp/openai_response.json
            echo "has_review=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          REVIEW=$(jq -r '.output_text // ([.output[]?.content[]?.text] | join("\n")) // empty' /tmp/openai_response.json)

          if [ -z "$REVIEW" ]; then
            echo "OpenAI returned an empty review. Skipping comment."
            echo "has_review=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$REVIEW" > /tmp/review.txt
          echo "has_review=true" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.openai.outputs.has_review == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 OpenAI Code Review\n\n${review}\n\n---\n*Revisión automática generada con OpenAI y .github/ai-review/SKILL.md*`
            });

      - name: Create manual review issue
        if: github.event_name == 'workflow_dispatch' && steps.openai.outputs.has_review == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.txt', 'utf8');
            const target = `${{ steps.context.outputs.target_label }}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 OpenAI Review — ${target}`,
              body: `## Revisión automática de ${target}\n\n${review}\n\n---\n*Generado con OpenAI y .github/ai-review/SKILL.md*`,
              labels: ['ai-review']
            });
